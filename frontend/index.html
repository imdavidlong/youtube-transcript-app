<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube 字幕下载</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow" aria-hidden="true"></div>

  <div class="lang-switcher-bar">
    <button id="lang-switcher" class="lang-switcher-btn">
      <span id="lang-switcher-label">EN</span>
    </button>
  </div>

  <div class="container">
    <header>
      <div class="logo">
        <span class="logo-icon">&#9654;</span>
        <span class="logo-text">Transcript<span class="logo-accent">DL</span></span>
      </div>
      <p class="subtitle" data-i18n="subtitle">YouTube 字幕一键下载</p>
    </header>

    <main>
      <div class="input-card">
        <label for="url-input" class="input-label" data-i18n="urlLabel">YouTube 视频链接</label>
        <div class="input-row">
          <input
            id="url-input"
            type="text"
            placeholder="https://www.youtube.com/watch?v=..."
            autocomplete="off"
            spellcheck="false"
            data-i18n-placeholder="urlPlaceholder"
          />
          <button id="fetch-btn" data-i18n="fetchBtn">获取字幕</button>
        </div>
      </div>

      <div id="history-section" class="hidden">
        <div class="history-header">
          <span class="history-title" data-i18n="historyLabel">最近记录</span>
          <button id="history-clear-btn" class="history-clear-btn" data-i18n="historyClear">清除</button>
        </div>
        <div id="history-list"></div>
      </div>

      <div id="loading" class="hidden">
        <div class="spinner"></div>
        <span data-i18n="loading">正在获取字幕，请稍候…</span>
      </div>

      <div id="error-msg" class="hidden">
        <span class="error-icon">&#9888;</span>
        <span id="error-text"></span>
      </div>

      <div id="result-section" class="hidden">
        <div class="result-meta">
          <div id="lang-info" class="lang-info"></div>
          <div class="translate-controls">
            <label class="toggle-label">
              <input type="checkbox" id="translate-toggle">
              <span data-i18n="translateLabel">翻译</span>
            </label>
            <select id="lang-select" class="hidden">
              <option value="zh-CN" data-i18n="langZh">中文</option>
            </select>
            <button id="translate-btn" class="hidden translate-btn" data-i18n="translateBtn">翻译</button>
            <span id="translate-loading" class="hidden" data-i18n="translating">翻译中…</span>
          </div>
          <button id="download-btn" class="download-btn">
            <span class="dl-icon">&#8681;</span>
            <span data-i18n="downloadBtn">下载 transcript.txt</span>
          </button>
        </div>
        <div id="translate-progress-wrap" class="hidden">
          <div id="translate-progress-bar"></div>
        </div>
        <div id="transcript-text"></div>
      </div>
    </main>

    <footer>
      <p data-i18n="footer">仅供学习使用 &mdash; 请遵守 YouTube 服务条款</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
